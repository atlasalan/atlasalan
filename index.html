<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>atlasalan.fun</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --surface: #0d1225;
    --card: #111827;
    --border: #1e2d4a;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --accent3: #c0ff1e;
    --text: #e2eaf8;
    --muted: #4a5568;
    --glow: 0 0 20px rgba(0,229,255,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
    pointer-events: none;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    z-index: 0;
    pointer-events: none;
  }

  .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px; }

  /* ── HEADER ── */
  header {
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanH 4s linear infinite;
  }

  @keyframes scanH {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .logo-title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    letter-spacing: 0.12em;
    color: var(--accent);
    text-shadow: var(--glow);
    line-height: 1;
  }

  .logo-sub {
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .header-stats {
    display: flex;
    gap: 32px;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent3);
    display: block;
  }

  .stat-label {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    padding: 20px 0;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-right: 4px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 20px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.08);
    box-shadow: 0 0 12px rgba(0,229,255,0.2);
  }

  .search-box {
    margin-left: auto;
    position: relative;
  }

  .search-box input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px 8px 36px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
  }

  /* ── GAME GRID ── */
  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    padding: 8px 0 48px;
  }

  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    animation: fadeInUp 0.4s ease both;
  }

  .game-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 32px rgba(0,229,255,0.15);
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Corner decorations */
  .game-card::before, .game-card::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    border-color: var(--accent);
    border-style: solid;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .game-card::before { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
  .game-card::after  { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }
  .game-card:hover::before, .game-card:hover::after { opacity: 1; }

  .game-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .game-thumb-icon {
    font-size: 3.5rem;
    opacity: 0.25;
    transition: opacity 0.25s, transform 0.25s;
  }

  .game-card:hover .game-thumb-icon {
    opacity: 0.4;
    transform: scale(1.1);
  }

  .type-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 3px 10px;
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }

  .badge-html {
    background: rgba(192,255,30,0.15);
    color: var(--accent3);
    border: 1px solid rgba(192,255,30,0.4);
  }

  .badge-exe {
    background: rgba(255,61,113,0.15);
    color: var(--accent2);
    border: 1px solid rgba(255,61,113,0.4);
  }

  .game-info {
    padding: 16px;
  }

  .game-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .game-meta {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }

  .game-actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    padding: 9px 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }

  .btn-play {
    background: var(--accent);
    color: var(--bg);
  }

  .btn-play:hover {
    background: #33ecff;
    box-shadow: 0 0 16px rgba(0,229,255,0.5);
  }

  .btn-download {
    background: transparent;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    clip-path: none;
  }

  .btn-download:hover {
    background: rgba(255,61,113,0.12);
    box-shadow: 0 0 12px rgba(255,61,113,0.3);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }

  .empty-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.3; }

  .empty-title {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .empty-sub { font-size: 0.85rem; opacity: 0.6; }

  /* ── MODAL (oyun içi) ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,8,16,0.95);
    z-index: 100;
    display: none;
    flex-direction: column;
  }

  .modal-overlay.open { display: flex; }

  .modal-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    flex: 1;
  }

  .modal-close {
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    width: 34px;
    height: 34px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-close:hover {
    background: var(--accent2);
    color: var(--bg);
  }

  .modal-iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: #000;
  }

  /* ── INSTALL INSTRUCTIONS ── */
  .install-notice {
    background: rgba(0,229,255,0.05);
    border: 1px solid rgba(0,229,255,0.15);
    padding: 10px 20px;
    margin-bottom: 20px;
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .install-notice span { color: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body>

<!-- MODAL (HTML oyun oynama) -->
<div class="modal-overlay" id="gameModal">
  <div class="modal-header">
    <div class="modal-title" id="modalTitle">OYUN</div>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <iframe class="modal-iframe" id="gameFrame" src="about:blank" allowfullscreen></iframe>
</div>

<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-title">⬡ OYUN MERKEZİ</div>
        <div class="logo-sub">Oyun Arşivi &amp; Portalı</div>
      </div>
      <div class="header-stats">
        <div class="stat">
          <span class="stat-num" id="totalCount">0</span>
          <span class="stat-label">Toplam</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="htmlCount">0</span>
          <span class="stat-label">Oynanabilir</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="exeCount">0</span>
          <span class="stat-label">İndirilebilir</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Nasıl kullanılır notu -->
  <div class="install-notice" style="margin-top:20px;">
    <span>ℹ</span>
   Oyunlarımı oynayabilirsiniz!
  </div>

  <div class="filter-bar">
    <span class="filter-label">Filtre:</span>
    <button class="filter-btn active" onclick="setFilter('all', this)">Tümü</button>
    <button class="filter-btn" onclick="setFilter('html', this)">🎮 HTML Oyunlar</button>
    <button class="filter-btn" onclick="setFilter('exe', this)">💾 İndirilebilir</button>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Oyun ara..." oninput="renderGames()">
    </div>
  </div>

  <div class="game-grid" id="gameGrid">
    <!-- Oyunlar buraya gelir -->
  </div>
</div>

<script>
/*
  ═══════════════════════════════════════════════════════════
  OYUN LİSTESİ — games.json ile dışarıdan yükle (önerilen)
  YA DA aşağıdaki GAMES dizisini manuel düzenle
  ═══════════════════════════════════════════════════════════

  Her oyun için format:
  {
    file: "dosya-adi.html"   veya  "dosya-adi.exe",
    folder: "games"           // dosyaların bulunduğu klasör (opsiyonel, varsayılan: "games")
  }

  Oyun adı otomatik olarak dosya adından üretilir (.html / .exe uzantısı gizlenir).
*/

// ── MANUAL GAME LIST (games.json yoksa bu kullanılır) ──────────────────
const MANUAL_GAMES = [
  // Örnek — kendi dosyalarınızla değiştirin:
  // { file: "tetris.html" },
  // { file: "snake.html" },
  // { file: "minecraft-launcher.exe" },
];

const GAMES_FOLDER = "games"; // Oyun dosyalarının klasörü

// ── STATE ──────────────────────────────────────────────────────────────
let allGames = [];
let activeFilter = 'all';

// ── INIT ───────────────────────────────────────────────────────────────
async function init() {
  // Önce games.json dene
  try {
    const res = await fetch('games.json');
    if (res.ok) {
      const data = await res.json();
      allGames = data.map(normalizeGame);
    } else { throw new Error('no json'); }
  } catch {
    // games.json yoksa manual listeyi kullan
    allGames = MANUAL_GAMES.map(normalizeGame);
  }

  updateStats();
  renderGames();
}

function normalizeGame(g) {
  const file = g.file || g;
  const folder = g.folder || GAMES_FOLDER;
  const ext = file.split('.').pop().toLowerCase();
  const name = file.replace(/\.[^.]+$/, '') // uzantıyı kaldır
                    .replace(/[-_]/g, ' ')   // tire/alt çizgiyi boşluğa çevir
                    .replace(/\b\w/g, c => c.toUpperCase()); // baş harfleri büyüt
  return { file, folder, ext, name, path: `${folder}/${file}` };
}

// ── STATS ──────────────────────────────────────────────────────────────
function updateStats() {
  const html = allGames.filter(g => g.ext === 'html').length;
  const exe  = allGames.filter(g => g.ext !== 'html').length;
  document.getElementById('totalCount').textContent = allGames.length;
  document.getElementById('htmlCount').textContent  = html;
  document.getElementById('exeCount').textContent   = exe;
}

// ── FILTER ─────────────────────────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGames();
}

// ── RENDER ─────────────────────────────────────────────────────────────
function renderGames() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let list = allGames;

  if (activeFilter === 'html') list = list.filter(g => g.ext === 'html');
  if (activeFilter === 'exe')  list = list.filter(g => g.ext !== 'html');
  if (q) list = list.filter(g => g.name.toLowerCase().includes(q));

  const grid = document.getElementById('gameGrid');

  if (list.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎮</div>
        <div class="empty-title">Oyun Bulunamadı</div>
        <div class="empty-sub">
          ${allGames.length === 0
            ? 'games/ klasörüne oyun ekleyin ve games.json dosyasını güncelleyin.'
            : 'Arama kriterlerinizi değiştirin.'}
        </div>
      </div>`;
    return;
  }

  grid.innerHTML = list.map((g, i) => gameCard(g, i)).join('');
}

function gameCard(g, i) {
  const isHtml = g.ext === 'html';
  const icons  = ['🎯','🕹️','⚔️','🏆','🚀','🎲','🐉','💣','🏎️','🧩','👾','🌌'];
  const icon   = icons[Math.abs(g.name.charCodeAt(0) + g.name.length) % icons.length];
  const delay  = Math.min(i * 0.05, 0.6);

  return `
  <div class="game-card" style="animation-delay:${delay}s">
    <div class="game-thumb">
      <div class="game-thumb-icon">${icon}</div>
      <div class="type-badge ${isHtml ? 'badge-html' : 'badge-exe'}">
        ${isHtml ? 'HTML' : g.ext.toUpperCase()}
      </div>
    </div>
    <div class="game-info">
      <div class="game-name" title="${g.name}">${g.name}</div>
      <div class="game-meta">${isHtml ? '🎮 Tarayıcıda oynanabilir' : '💾 Masaüstü uygulaması'}</div>
      <div class="game-actions">
        ${isHtml ? `<button class="btn btn-play" onclick="playGame('${g.path}','${escape(g.name)}')">▶ OYNA</button>` : ''}
        <button class="btn btn-download" onclick="downloadGame('${g.path}','${g.file}')">⬇ İNDİR</button>
      </div>
    </div>
  </div>`;
}

// ── ACTIONS ────────────────────────────────────────────────────────────
function playGame(path, name) {
  document.getElementById('modalTitle').textContent = unescape(name);
  document.getElementById('gameFrame').src = path;
  document.getElementById('gameModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('gameModal').classList.remove('open');
  document.getElementById('gameFrame').src = 'about:blank';
  document.body.style.overflow = '';
}

function downloadGame(path, filename) {
  const a = document.createElement('a');
  a.href = path;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ESC ile modal kapat
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── START ──────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
